<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

.banner{

height:100vh;

background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.9)),
url("foto-capa.jpg");

background-size:cover;
background-position:center;

display:flex;
justify-content:flex-end;
flex-direction:column;

padding:20px;

}

.logo{

font-size:42px;
font-weight:bold;
color:#E50914;

}

.banner h1{

font-size:34px;
margin-top:15px;

}

.banner p{

margin-top:15px;
color:#ddd;
line-height:28px;

}

.botao{

margin-top:25px;

background:white;

color:black;

padding:15px;

width:100%;

text-align:center;

font-size:20px;

border-radius:10px;

text-decoration:none;

font-weight:bold;

}

section{

padding:20px;

}

h2{

margin-bottom:20px;

font-size:28px;

}

.cards{

display:flex;

overflow-x:auto;

gap:15px;

scroll-snap-type:x mandatory;

}

.cards img{

width:240px;

height:150px;

border-radius:12px;

object-fit:cover;

scroll-snap-align:center;

}

.video-container{

max-width:1000px;

margin:auto;

padding:20px;

}

.video-container video{

width:100%;

height:auto;

object-fit:contain;

border-radius:15px;

}

.carta{

background:#111;

padding:20px;

border-radius:15px;

font-size:18px;

line-height:32px;

}

#texto::after{

content:"|";

animation:piscando .7s infinite;

}

@keyframes piscando{

50%{

opacity:0;

}

}

.contador{

font-size:40px;

text-align:center;

color:#ff4b4b;

font-weight:bold;

margin-top:20px;

}

footer{

padding:40px;

text-align:center;

font-size:28px;

}

.coracao{

position:fixed;

bottom:-20px;

color:red;

animation:subir linear forwards;

pointer-events:none;

}

@keyframes subir{

0%{

transform:translateY(0);

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

@media(min-width:768px){

.banner{

padding:80px;

}

.banner h1{

font-size:60px;

}

.banner p{

width:600px;

font-size:22px;

}

.botao{

width:300px;

}

.cards img{

width:350px;

height:220px;

}

.carta{

font-size:22px;

}

}

.music-btn{

position:fixed;
bottom:25px;
right:25px;

width:65px;
height:65px;

background:#E50914;
border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
cursor:pointer;

box-shadow:0 0 20px rgba(229,9,20,.7);

z-index:9999;

transition:.3s;

}

.music-btn:hover{

transform:scale(1.1);

}

audio{
display:none;
}


body{

margin:0;
background:black;
font-family:Arial;
color:white;

}

.hero{

position:relative;

width:100%;

height:100vh;

background-image:

linear-gradient(
to top,
rgba(0,0,0,.95) 5%,
rgba(0,0,0,.3) 45%,
rgba(0,0,0,.2) 100%
),

url("capa.jpeg");

background-repeat:no-repeat;

background-size:cover;

background-position:center center;

overflow:hidden;

}

nav{

position:absolute;

top:0;
left:0;

width:100%;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

z-index:100;

}

.logo{

font-size:40px;

font-weight:bold;

color:#E50914;

}

.menu{

display:flex;
gap:30px;

}

.menu a{

color:white;

text-decoration:none;

font-size:18px;

}

.conteudo{

position:absolute;

left:60px;

bottom:120px;

max-width:500px;

z-index:10;

}

.categoria{

font-size:20px;

letter-spacing:5px;

color:#ddd;

}

h1{

font-size:70px;

margin:15px 0;

}

.conteudo p{

font-size:24px;

line-height:40px;

color:#ddd;

}

.botoes{

display:flex;

gap:20px;

margin-top:30px;

}

.assistir{

background:white;

color:black;

padding:18px 35px;

border:none;

border-radius:8px;

font-size:22px;

font-weight:bold;

cursor:pointer;

}

.lista{

background:rgba(120,120,120,.4);

color:white;

padding:18px 35px;

border:none;

border-radius:8px;

font-size:22px;

cursor:pointer;

}

@media(max-width:768px){

.hero{

height:100vh;

/* faz a foto preencher toda a tela */

background-size:cover;

/* centraliza a pessoa na foto */

background-position:center center;

}

.conteudo{

position:absolute;

bottom:70px;

left:30px;

right:30px;

max-width:90%;

}

.logo{

font-size:32px;

}

h1{

font-size:55px;

}

.conteudo p{

font-size:20px;

line-height:32px;

}

.botoes{

display:flex;

flex-direction:column;

gap:15px;

}

.assistir,
.lista{

width:100%;

height:60px;

font-size:22px;

}

}

    

</style>

</head>

<body>

    <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" onclick="toggleMusic()">
    🎵
</div>


<script>
function iniciarHistoria() {
    document.getElementById("musica").play();

    document.getElementById("video").scrollIntoView({
        behavior: "smooth"
    });
}
</script>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>


<header class="hero">

    <nav>

        <div class="logo">
            NOSSA SÉRIE ❤️
        </div>

    </nav>

    <div class="overlay"></div>

    <div class="conteudo">

        <span class="categoria">❤️ SÉRIE ROMANCE</span>

        <h1>NOSSA SÉRIE ❤️</h1>

        <p>

        Entre tantos episódios da vida,
        você foi o melhor que me aconteceu.

        </p>

        <div class="botoes">


        </div>

    </div>

</header>

<h1>
Você é meu episódio favorito.
</h1>


<a class="botao" href="#video">

▶ Assistir Agora

</a>

</div>

<section>

<h2>📸 Momentos</h2>

<div class="cards">

<img src="foto1.jpg.jpeg.jpeg">

<img src="foto2.jpg.jpeg.jpeg">

<img src="foto3.jpg.jpeg.jpeg">

<img src="foto4.jpg.jpeg.jpeg">

<img src="foto5.jpg.jpeg.jpeg">

</div>

</section>

<section id="video">

<h2>🎥 Nosso Vídeo</h2>

<video controls>

<source src="video3.mp4" type="video/mp4">

</video>

</section>

<section>

<h2>💌 Carta</h2>

<div class="carta">

<p id="texto"></p>

</div>

</section>

<section>

<h2>❤️ Juntos há</h2>

<div class="contador" id="dias"></div>

</section>

<footer>

Para sempre nós ❤️

</footer>

<script>

const mensagem=`Meu amor,

Você entrou na minha vida e tudo mudou.

Cada abraço, cada sorriso e cada momento ao seu lado fizeram meu coração encontrar um lar.

Obrigado por existir.

Você é a melhor parte da minha história.

Eu te amo infinitamente. ❤️`;

let pos=0;

function escrever(){

if(pos<mensagem.length){

document.getElementById("texto").innerHTML+=mensagem.charAt(pos);

pos++;

setTimeout(escrever,40);

}

}

escrever();

const namoro=new Date("2022-11-12");

const hoje=new Date();

const dias=Math.floor((hoje-namoro)/(1000*60*60*24));

document.getElementById("dias").innerHTML=dias+" dias";

function coracao(){

const c=document.createElement("div");

c.className="coracao";

c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";

c.style.fontSize=(20+Math.random()*20)+"px";

c.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},9000);

}

setInterval(coracao,300);



</script>

<script>

let tocando = false;

const audio = document.getElementById("musica");

function toggleMusic(){

    if(tocando){

        audio.pause();

    }else{

        audio.play();

    }

    tocando = !tocando;

}

</script>

</body>


</html>
